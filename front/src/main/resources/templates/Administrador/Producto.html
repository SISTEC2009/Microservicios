<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

	<div th:replace="~{layout/base :: head}" ></div>

<body>

	<div th:replace="~{layout/base :: header}" ></div>

<div class="main-content">

	<!-- ===== productos/ Filtros ===== -->
		<div id="productos" class="section">

			<!-- FILTROS -->
			<form class="filters" th:action="@{/productos/filtro}" method="get" id="formFiltros">
				<div class="filters-header">
					<div class="filters-title">Filtros de búsqueda</div>
					<div class="filters-toggle">[+ Ver más]</div>
				</div>
				<div class="filters-form">
					<div class="filter-group">
						<input type="text" name="nombre" id="producto-nombre" placeholder="Nombre del producto"
							th:value="${qNombre}">
					</div>
					<div class="filter-group">
						<select name="categoria" id="producto-categoria" th:value="${qCategoria}">
							<option value="">Todas las categorías</option>
							<option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"></option>
						</select>
					</div>
					<div class="filter-group">
						<select name="estado" id="producto-estado" th:value="${qEstado}">
							<option value="">Todos los estados</option>
							<option value="ACTIVO">ACTIVO</option>
							<option value="INACTIVO">INACTIVO</option>
						</select>
					</div>
				</div>
			</form>

			<div class="table-container">
				<div class="table-header" style="display:flex;justify-content:space-between;align-items:center;">
					<button class="btn btn-primary" id="btn-nuevo" data-bs-toggle="modal"
						data-bs-target="#modalProducto">
						Nuevo Producto
					</button>
					<div class="table-actions">
						<button class="btn btn-secondary" onclick="exportarProductos()">Exportar</button>
						<button class="btn btn-secondary">Mostrar/Ocultar columnas</button>
					</div>
				</div>

				<!-- GRID -->
				<div class="row" id="product-grid">
					<div class="col-md-3 mb-4" th:each="p : ${listaProductos}">
						<div class="card h-100">
							<img th:if="${p.imagen}" 
							     th:src="@{/imagenes/{img}(img=${p.imagen})}" 
							     class="card-img-top"
							     alt="Producto"
							     style="height:150px;object-fit:cover;">

							<div class="card-body">
								<h5 class="card-title" th:text="${p.nombre}">Nombre</h5>
								<p class="card-text">Categoría: <span th:text="${p.categoria.nombre}"></span></p>
								<p class="card-text">Precio: S/ <span
										th:text="${#numbers.formatDecimal(p.precio,1,2)}">0.00</span></p>
								<span class="badge bg-success" th:if="${p.estado == 'ACTIVO'}">ACTIVO</span>
								<span class="badge bg-secondary" th:if="${p.estado == 'INACTIVO'}">INACTIVO</span>
							</div>
							<div class="card-footer d-flex gap-2 justify-content-center">
								<button class="btn btn-warning btn-sm btn-editar"
        data-bs-toggle="modal"
        data-bs-target="#modalProducto"
        th:attr="data-id=${p.id},
                 data-nombre=${p.nombre},
                 data-categoria-id=${p.categoria.id},
                 data-precio=${p.precio},
                 data-estado=${p.estado},
                 data-imagen=${p.imagen}">
  Editar
</button>
								<form th:action="@{/productos/delete/{id}/eliminar(id=${p.id})}"  method="post"
									onsubmit="return confirm('¿Eliminar producto?');">
									<button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
								</form>
							</div>
						</div>
					</div>

					<div th:if="${#lists.isEmpty(listaProductos)}" class="text-muted">No hay productos.</div>
				</div>

				<div class="d-flex justify-content-between mt-3">
					<div>Mostrando <b th:text="${listaProductos.size()}">0</b> productos</div>
					<div class="btn-group">
						<button class="btn btn-outline-secondary btn-sm" disabled>Anterior</button>
						<button class="btn btn-primary btn-sm">1</button>
						<button class="btn btn-outline-secondary btn-sm" disabled>Siguiente</button>
					</div>
				</div>
			</div>

			<!-- MODAL Crear/Editar -->
			<div class="modal fade" id="modalProducto" tabindex="-1" aria-hidden="true">
				<div class="modal-dialog">
					<div class="modal-content">
						<form id="formProducto"  th:action="@{/productos/guardar} "
							method="post" enctype="multipart/form-data" th:object="${newProducto}">

							<div class="modal-header">
								<h5 id="modalProductoLabel">Nuevo Producto</h5>
								<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
							</div>

							<div class="modal-body">
								<input th:field="*{id}" type="hidden"  id="inp-id">

								<div class="mb-3">
									<label>Nombre</label>
									<input th:field="*{nombre}" type="text"  id="inp-nombre" class="form-control"
										required>
								</div>
								
									<div class="mb-3">
									<label>Descripcion</label>
									<input th:field="*{descripcion}" type="text"  id="inp-descripcion" class="form-control"
										required>
								</div>
								

								<select th:field="*{categoria.id}" class="form-control" required>
								    <option value="" disabled selected>Selecciona una categoría</option>
								    <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"></option>
								</select>

								<div class="mb-3">
									<label>Precio</label>
									<input th:field="*{precio}" type="number" step="0.01" min="0"  id="inp-precio"
										class="form-control" required>
								</div>

								<div class="mb-3">
									<label>Estado</label>
									<select th:field="*{estado}" id="inp-estado" class="form-select" required>
										<option value="">Selecciona…</option>
										<option value="ACTIVO">ACTIVO</option>
										<option value="INACTIVO">INACTIVO</option>
									</select>
								</div>

								<input type="hidden" th:field="*{imagen}" id="inp-imagen">

								<div class="mb-3">
									<label>Imagen (PNG/JPG)</label>
									<input type="file" name="archivo" accept=".png,.jpg,.jpeg" class="form-control" id="inp-archivo">

									<div class="form-text" id="fileHelp">Puedes dejarlo vacío para conservar la imagen
										actual.</div>
									<img id="preview" class="mt-2" style="max-height:120px; display:none;"
										alt="preview">
								</div>
							</div>

							<div class="modal-footer">
								<button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
								<button type="submit" class="btn btn-primary">Guardar</button>
							</div>

						</form>
					</div>
				</div>
			</div>
		</div>
</div>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


	<script>
		(function () {
			const form = document.getElementById('formFiltros');
			if (!form) return;

			const go = () => {
				const url = new URL(form.action, window.location.origin);
				const params = new URLSearchParams(new FormData(form));
				window.location.href = url.pathname + '?' + params.toString() + '#productos';
			};

			let t;
			document.getElementById('producto-nombre')?.addEventListener('input', () => {
				clearTimeout(t);
				t = setTimeout(go, 400);
			});
			['producto-categoria', 'producto-estado'].forEach(id => {
				document.getElementById(id)?.addEventListener('change', go);
			});
		})();

		// Navegación por hash
		function showSection(id) {
			document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
			const el = document.getElementById(id);
			if (el) el.style.display = 'block';
		}
		window.addEventListener('load', () => showSection(location.hash?.substring(1) || 'productos'));
		window.addEventListener('hashchange', () => showSection(location.hash.substring(1)));

		document.addEventListener('DOMContentLoaded', () => {
			  const form = document.getElementById('formProducto');
			  const label = document.getElementById('modalProductoLabel');

			  const inpId = document.getElementById('inp-id');
			  const inpNombre = document.getElementById('inp-nombre');
			  const inpDescripcion = document.getElementById('inp-descripcion');
			  const selCategoria = form?.querySelector('select[name="categoria.id"]');
			  const inpPrecio = document.getElementById('inp-precio');
			  const selEstado = document.getElementById('inp-estado');
			  const inpImagen = document.getElementById('inp-imagen');
			  const inpArchivo = document.getElementById('inp-archivo');
			  const preview = document.getElementById('preview');
			  const fileHelp = document.getElementById('fileHelp');

			  // Nuevo producto → limpia form
			  document.getElementById('btn-nuevo')?.addEventListener('click', () => {
			    form.action = '/productos/guardar';
			    label.textContent = 'Nuevo Producto';

			    inpId.value = '';
			    inpNombre.value = '';
			    inpDescripcion.value = '';
			    if (selCategoria) selCategoria.value = '';
			    inpPrecio.value = '';
			    selEstado.value = '';
			    inpImagen.value = '';
			    inpArchivo.value = '';

			    preview.src = '';
			    preview.style.display = 'none';
			    fileHelp.textContent = 'Puedes dejarlo vacío si no quieres subir imagen.';
			  });

			  // Editar → precarga data
			  document.querySelectorAll('.btn-editar').forEach(btn => {
			    btn.addEventListener('click', () => {
			      const { id, nombre, categoriaId, precio, estado, imagen } = btn.dataset;

			      form.action = '/productos/guardar';
			      label.textContent = 'Editar Producto';

			      inpId.value = id || '';
			      inpNombre.value = nombre || '';
			      if (selCategoria) selCategoria.value = categoriaId || '';
			      inpPrecio.value = precio || '';
			      selEstado.value = estado || '';
			      inpImagen.value = imagen || '';
			      inpArchivo.value = '';

			      if (imagen) {
			        preview.src = `/imagenes/${imagen}`;
			        preview.style.display = 'block';
			        fileHelp.textContent = 'Si no seleccionas un archivo, se conservará la imagen actual.';
			      } else {
			        preview.src = '';
			        preview.style.display = 'none';
			        fileHelp.textContent = 'Puedes dejarlo vacío si no quieres subir imagen.';
			      }
			    });
			  });

			  // Preview del archivo nuevo
			  inpArchivo?.addEventListener('change', (e) => {
			    const file = e.target.files?.[0];
			    if (file) {
			      const reader = new FileReader();
			      reader.onload = ev => {
			        preview.src = ev.target.result;
			        preview.style.display = 'block';
			      };
			      reader.readAsDataURL(file);
			    } else {
			      if (inpImagen.value) {
			        preview.src = `/imagenes/${inpImagen.value}`;
			        preview.style.display = 'block';
			      } else {
			        preview.src = '';
			        preview.style.display = 'none';
			      }
			    }
			  });
			});
	</script>


	<script>
		let cart = [];
		let currentDeleteItem = {type: '', id: 0, name: ''};
		const clientes = [
			{id: 1, nombre: 'Restaurant Lima S.A.C', documento: '20123456789'},
			{id: 2, nombre: 'Juan Pérez', documento: '45678912'},
			{id: 3, nombre: 'María Rodríguez', documento: '10987654'},
			{id: 4, nombre: 'Carlos Gómez', documento: '87654321'},
			{id: 5, nombre: 'Ana Torres', documento: '76543210'}
		];

		// Inicialización
		document.addEventListener('DOMContentLoaded', function () {
			// Inicializar menú
			document.querySelectorAll('.sidebar-menu a').forEach(item => {
				item.addEventListener('click', function (e) {
					document.querySelectorAll('.sidebar-menu a').forEach(i => i.classList.remove('active'));
					this.classList.add('active');
				});
			});

			// Inicializar dropdown de usuario
			document.getElementById('user-icon').addEventListener('click', function () {
				document.getElementById('user-dropdown').classList.toggle('active');
			});

			// Cerrar dropdown al hacer clic fuera
			document.addEventListener('click', function (e) {
				if (!e.target.closest('#user-icon') && !e.target.closest('#user-dropdown')) {
					document.getElementById('user-dropdown').classList.remove('active');
				}
			});

			// Inicializar filtros
			document.getElementById('toggle-filters').addEventListener('click', function () {
				const filtersForm = this.closest('.filters').querySelector('.filters-form');
				if (filtersForm.style.display === 'none') {
					filtersForm.style.display = 'flex';
					this.textContent = '[- Ocultar]';
				} else {
					filtersForm.style.display = 'none';
					this.textContent = '[+ Ver más]';
				}
			});

			// Inicializar autocompletado de clientes
			const clienteInput = document.getElementById('cliente-venta');
			const clienteResults = document.getElementById('cliente-results');

			if (clienteInput) {
				clienteInput.addEventListener('input', function () {
					const value = this.value.toLowerCase();
					if (value.length < 2) {
						clienteResults.classList.remove('active');
						return;
					}

					const filteredClientes = clientes.filter(cliente =>
						cliente.nombre.toLowerCase().includes(value) ||
						cliente.documento.includes(value)
					);

					if (filteredClientes.length > 0) {
						clienteResults.innerHTML = '';
						filteredClientes.forEach(cliente => {
							const item = document.createElement('div');
							item.className = 'autocomplete-item';
							item.textContent = `${cliente.nombre} (${cliente.documento})`;
							item.addEventListener('click', function () {
								clienteInput.value = cliente.nombre;
								clienteResults.classList.remove('active');
							});
							clienteResults.appendChild(item);
						});
						clienteResults.classList.add('active');
					} else {
						clienteResults.classList.remove('active');
					}
				});

				// Cerrar autocompletado al hacer clic fuera
				document.addEventListener('click', function (e) {
					if (!e.target.closest('.autocomplete-container')) {
						clienteResults.classList.remove('active');
					}
				});
			}

			// Inicializar filtro de productos en POS
			const posSearch = document.getElementById('pos-search');
			if (posSearch) {
				posSearch.addEventListener('input', function () {
					const value = this.value.toLowerCase();
					document.querySelectorAll('.pos-product').forEach(product => {
						const name = product.querySelector('.pos-product-name').textContent.toLowerCase();
						if (name.includes(value)) {
							product.style.display = 'block';
						} else {
							product.style.display = 'none';
						}
					});
				});
			}

			// Inicializar categorías de POS
			document.querySelectorAll('.pos-category').forEach(category => {
				category.addEventListener('click', function () {
					document.querySelectorAll('.pos-category').forEach(c => c.classList.remove('active'));
					this.classList.add('active');

					const categoryValue = this.getAttribute('data-category');
					document.querySelectorAll('.pos-product').forEach(product => {
						if (categoryValue === 'todos' || product.getAttribute('data-category') === categoryValue) {
							product.style.display = 'block';
						} else {
							product.style.display = 'none';
						}
					});
				});
			});

			// Inicializar confirmación de eliminación
			document.getElementById('confirm-cancel').addEventListener('click', function () {
				document.getElementById('confirm-dialog').style.display = 'none';
			});

			document.getElementById('confirm-ok').addEventListener('click', function () {
				document.getElementById('confirm-dialog').style.display = 'none';
				deleteItem(currentDeleteItem.type, currentDeleteItem.id);
			});

			// Inicializar filtros de tablas
			initTableFilters();
		});

		// Funciones de navegación
		function showSection(sectionId) {
			document.querySelectorAll('.section').forEach(section => {
				section.classList.remove('active');
			});

			document.getElementById(sectionId).classList.add('active');
			document.querySelector('.page-title').textContent = sectionId.toUpperCase();
		}

		// Funciones de carrito
		function addToCart(name, price) {
			const existingItem = cart.find(item => item.name === name);

			if (existingItem) {
				existingItem.quantity++;
			} else {
				cart.push({
					name: name,
					price: price,
					quantity: 1
				});
			}

			updateCart();
			showToast(`${name} agregado al carrito`, 'success');
		}

		function updateCart() {
			const cartItems = document.getElementById('cart-items');
			const cartTotal = document.getElementById('cart-total');

			cartItems.innerHTML = '';
			let total = 0;

			cart.forEach((item, index) => {
				const itemTotal = item.price * item.quantity;
				total += itemTotal;

				const cartItem = document.createElement('div');
				cartItem.className = 'pos-cart-item';
				cartItem.innerHTML = `
                    <div class="pos-item-details">
                        <div class="pos-item-name">${item.name}</div>
                        <div class="pos-item-price">S/ ${item.price.toFixed(2)} x ${item.quantity}</div>
                    </div>
                    <div class="pos-item-quantity">
                        <button class="pos-quantity-btn" onclick="decreaseQuantity(${index})">-</button>
                        <span>${item.quantity}</span>
                        <button class="pos-quantity-btn" onclick="increaseQuantity(${index})">+</button>
                    </div>
                `;

				cartItems.appendChild(cartItem);
			});

			cartTotal.textContent = `S/ ${total.toFixed(2)}`;
		}

		function increaseQuantity(index) {
			cart[index].quantity++;
			updateCart();
		}

		function decreaseQuantity(index) {
			if (cart[index].quantity > 1) {
				cart[index].quantity--;
			} else {
				cart.splice(index, 1);
			}
			updateCart();
		}

		function procesarVenta() {
			if (cart.length === 0) {
				showToast('El carrito está vacío', 'error');
				return;
			}

			showToast('Venta procesada correctamente', 'success');
			cart = [];
			updateCart();
		}

		// Funciones de notificaciones
		function showToast(message, type = 'info') {
			const toastContainer = document.getElementById('toast-container');
			const toast = document.createElement('div');
			toast.className = `toast toast-${type}`;
			toast.innerHTML = `
                ${message}
                <button class="toast-close" onclick="this.parentElement.remove()">×</button>
            `;

			toastContainer.appendChild(toast);

			// Auto-eliminar después de 3 segundos
			setTimeout(() => {
				toast.remove();
			}, 3000);
		}

		// Funciones de confirmación
		function confirmDelete(type, id, name) {
			currentDeleteItem = {type, id, name};

			const confirmMessage = document.getElementById('confirm-message');
			confirmMessage.textContent = `¿Está seguro que desea eliminar ${type === 'venta' ? 'la venta' : type === 'cliente' ? 'el cliente' : type === 'ingrediente' ? 'el ingrediente' : 'la reserva'} "${name}"?`;

			document.getElementById('confirm-dialog').style.display = 'block';
		}

		function deleteItem(type, id) {
			// Aquí iría la lógica para eliminar el elemento de la base de datos
			// Por ahora solo mostramos un mensaje
			showToast(`${type === 'venta' ? 'Venta' : type === 'cliente' ? 'Cliente' : type === 'ingrediente' ? 'Ingrediente' : 'Reserva'} eliminado correctamente`, 'success');

			// Simulamos la eliminación de la fila
			const tables = {
				'venta': 'ventas-tabla',
				'cliente': 'clientes-tabla',
				'ingrediente': 'inventario-tabla',
				'reserva': 'reservas-tabla'
			};

			const table = document.getElementById(tables[type]);
			if (table) {
				const rows = table.querySelectorAll('tbody tr');
				if (rows.length > id - 1) {
					rows[id - 1].remove();
				}
			}
		}

		// Funciones de ordenamiento de tablas
		function sortTable(tableId, columnIndex) {
			const table = document.getElementById(tableId);
			const header = table.querySelector(`th:nth-child(${columnIndex + 1})`);
			const isAsc = header.classList.contains('sort-asc');

			// Limpiar clases de ordenamiento
			table.querySelectorAll('th').forEach(th => {
				th.classList.remove('sort-asc', 'sort-desc');
			});

			// Establecer nueva clase de ordenamiento
			header.classList.add(isAsc ? 'sort-desc' : 'sort-asc');

			// Ordenar filas
			const rows = Array.from(table.querySelectorAll('tbody tr'));
			rows.sort((a, b) => {
				const aValue = a.querySelector(`td:nth-child(${columnIndex + 1})`).textContent.trim();
				const bValue = b.querySelector(`td:nth-child(${columnIndex + 1})`).textContent.trim();

				// Detectar si es un número
				if (!isNaN(parseFloat(aValue)) && !isNaN(parseFloat(bValue))) {
					return isAsc ? parseFloat(aValue) - parseFloat(bValue) : parseFloat(bValue) - parseFloat(aValue);
				}

				// Ordenar como texto
				return isAsc ? aValue.localeCompare(bValue) : bValue.localeCompare(aValue);
			});

			// Reordenar filas en la tabla
			const tbody = table.querySelector('tbody');
			rows.forEach(row => tbody.appendChild(row));
		}

		// Funciones de exportación
		function exportarTabla(tableId) {
			const table = document.getElementById(tableId);
			if (!table) return;

			// Crear CSV
			let csv = [];

			// Encabezados
			const headers = [];
			table.querySelectorAll('th').forEach(th => {
				headers.push(th.textContent.trim());
			});
			csv.push(headers.join(','));

			// Filas
			table.querySelectorAll('tbody tr').forEach(tr => {
				const row = [];
				tr.querySelectorAll('td').forEach((td, index) => {
					// Excluir la columna de acciones
					if (index < headers.length - 1) {
						let text = td.textContent.trim();
						// Si hay un span de estado, obtener su texto
						const status = td.querySelector('.status');
						if (status) {
							text = status.textContent.trim();
						}
						row.push(`"${text}"`);
					}
				});
				csv.push(row.join(','));
			});

			// Descargar CSV
			const csvContent = csv.join('\n');
			const blob = new Blob([csvContent], {type: 'text/csv;charset=utf-8;'});
			const url = URL.createObjectURL(blob);

			const link = document.createElement('a');
			link.setAttribute('href', url);
			link.setAttribute('download', `${tableId}.csv`);
			link.style.visibility = 'hidden';

			document.body.appendChild(link);
			link.click();
			document.body.removeChild(link);

			showToast('Tabla exportada correctamente', 'success');
		}

		function exportarProductos() {
			// Crear CSV para productos
			let csv = ['Nombre,Categoría,Precio,Disponibilidad'];

			document.querySelectorAll('.product-card').forEach(card => {
				const nombre = card.querySelector('.product-title').textContent.trim();
				const categoria = card.querySelector('.product-category').textContent.replace('Categoría: ', '').trim();
				const precio = card.querySelector('.product-price').textContent.replace('S/ ', '').trim();
				const disponibilidad = card.querySelector('.product-availability').textContent.trim();

				csv.push(`"${nombre}","${categoria}","${precio}","${disponibilidad}"`);
			});

			// Descargar CSV
			const csvContent = csv.join('\n');
			const blob = new Blob([csvContent], {type: 'text/csv;charset=utf-8;'});
			const url = URL.createObjectURL(blob);

			const link = document.createElement('a');
			link.setAttribute('href', url);
			link.setAttribute('download', 'productos.csv');
			link.style.visibility = 'hidden';

			document.body.appendChild(link);
			link.click();
			document.body.removeChild(link);

			showToast('Productos exportados correctamente', 'success');
		}

		// Funciones de filtrado de tablas
		function initTableFilters() {
			// Filtro de ventas
			const fechaVenta = document.getElementById('fecha-venta');
			const clienteVenta = document.getElementById('cliente-venta');
			const numeroVenta = document.getElementById('numero-venta');

			if (fechaVenta && clienteVenta && numeroVenta) {
				const filterVentas = () => {
					const fecha = fechaVenta.value;
					const cliente = clienteVenta.value.toLowerCase();
					const numero = numeroVenta.value.toLowerCase();

					document.querySelectorAll('#ventas-tabla tbody tr').forEach(row => {
						const fechaCell = row.cells[0].textContent.toLowerCase();
						const clienteCell = row.cells[1].textContent.toLowerCase();
						const numeroCell = row.cells[2].textContent.toLowerCase();

						const fechaMatch = !fecha || fechaCell.includes(fecha);
						const clienteMatch = !cliente || clienteCell.includes(cliente);
						const numeroMatch = !numero || numeroCell.includes(numero);

						if (fechaMatch && clienteMatch && numeroMatch) {
							row.style.display = '';
						} else {
							row.style.display = 'none';
						}
					});
				};

				fechaVenta.addEventListener('input', filterVentas);
				clienteVenta.addEventListener('input', filterVentas);
				numeroVenta.addEventListener('input', filterVentas);
			}

			// Filtro de productos
			const productoNombre = document.getElementById('producto-nombre');
			const productoCategoria = document.getElementById('producto-categoria');
			const productoEstado = document.getElementById('producto-estado');

			if (productoNombre && productoCategoria && productoEstado) {
				const filterProductos = () => {
					const nombre = productoNombre.value.toLowerCase();
					const categoria = productoCategoria.value.toLowerCase();
					const estado = productoEstado.value.toLowerCase();

					document.querySelectorAll('.product-card').forEach(card => {
						const nombreText = card.querySelector('.product-title').textContent.toLowerCase();
						const categoriaText = card.querySelector('.product-category').textContent.toLowerCase();
						const estadoText = card.querySelector('.product-availability').textContent.toLowerCase();

						const nombreMatch = !nombre || nombreText.includes(nombre);
						const categoriaMatch = !categoria || categoriaText.includes(categoria);
						const estadoMatch = !estado || (estado === 'disponible' && estadoText.includes('disponible')) ||
							(estado === 'no-disponible' && estadoText.includes('no disponible'));

						if (nombreMatch && categoriaMatch && estadoMatch) {
							card.style.display = '';
						} else {
							card.style.display = 'none';
						}
					});
				};

				productoNombre.addEventListener('input', filterProductos);
				productoCategoria.addEventListener('change', filterProductos);
				productoEstado.addEventListener('change', filterProductos);
			}
		}
